<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enerqubix AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F7F5F0;
      font-family: 'Instrument Serif', serif;
      -webkit-font-smoothing: antialiased;
    }

    .center {
      text-align: center;
      padding: 24px;
    }

    .company {
      font-size: clamp(28px, 5vw, 42px);
      color: #0D7377;
      letter-spacing: 0.01em;
      margin-bottom: 20px;
    }

    .tagline {
      font-size: clamp(18px, 3vw, 26px);
      font-style: italic;
      color: #111918;
      margin-bottom: 32px;
    }

    .email {
      font-size: clamp(14px, 2vw, 17px);
      color: #0D7377;
      text-decoration: none;
      border-bottom: 1px solid rgba(13, 115, 119, 0.3);
      padding-bottom: 2px;
      transition: border-color 0.2s ease;
    }

    .email:hover { border-color: #0D7377; }
  </style>
</head>
<body>
  <div class="center">
    <p class="company">Enerqubix AI</p>
    <p class="tagline">Something exciting is coming.</p>
    <a href="mailto:murugesh@enerqubix.com" class="email">murugesh@enerqubix.com</a>
  </div>
</body>
</html>
